syntax = "proto3";

package presence;

option go_package = "github.com/bottomhalf/btc-grpc-presence/genproto/presence";

service PresenceService {
    rpc GetStatus (StatusRequest) returns (StatusResponse);
    rpc GetPresenceList (PresenceListRequest) returns (PresenceListResponse);
}

message StatusRequest {
    string user_id = 1;
}

message StatusResponse {
    string user_id = 1;
    string status = 2;
    string last_seen = 3;
}

message PresenceListRequest {
    string user_id = 1;
}

message Participant {
    string user_id = 1;
    string first_name = 2;
    string last_name = 3;
    string email = 4;
    string avatar = 5;
    string role = 6;
    string status = 7;
    int64  last_seen = 8;
}

message ConversationInfo {
    string conversation_id = 1;
    string type = 2;
    string title = 3;
    string avatar = 4;
    int64  last_message_at = 5;
    int32  member_count = 6;
    int32  unread_count = 7;
    bool   is_muted = 8;
    bool   is_pinned = 9;
    bool   is_archived = 10;
    repeated Participant members = 11;
}

message PresenceListResponse {
    string user_id = 1;
    repeated ConversationInfo conversations = 2;
}
